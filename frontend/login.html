<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Pricely</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">PRICELY</a>
        </div>
    </nav>

    <div class="form-container">
        <div class="card">
            <h2 class="text-center mb-4">Iniciar Sesión</h2>
            <div id="error-message" class="error-message"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%">Ingresar</button>
            </form>
            <p class="text-center mt-4">
                ¿No tienes cuenta? <a href="register.html">Regístrate</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('error-message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await api.post('/auth/login', {
                    correo: email,
                    password: password
                });
                
                if (res.access_token) {
                    localStorage.setItem('token', res.access_token);
                    localStorage.setItem('user', JSON.stringify(res.usuario));
                    window.location.href = '/index.html';
                }
            } catch (err) {
                errorDiv.textContent = 'Correo o contraseña incorrectos';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
