<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Pricely</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">PRICELY</a>
        </div>
    </nav>

    <div class="form-container">
        <div class="card">
            <h2 class="text-center mb-4">Registrarse</h2>
            <div id="error-message" class="error-message"></div>
            <form id="register-form">
                <div class="form-group">
                    <label>Nombre completo</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%">Registrarse</button>
            </form>
            <p class="text-center mt-4">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('register-form');
        const errorDiv = document.getElementById('error-message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                await api.post('/auth/register', {
                    nombre: nombre,
                    correo: email,
                    password: password
                });
                window.location.href = '/login.html';
            } catch (err) {
                errorDiv.textContent = 'Error al registrarse. Intenta con otro correo.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
